{% extends "base.html" %}

{% block title %}Server Error - InstaClone{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="card shadow-sm">
                <div class="card-body py-5">
                    <i class="fas fa-cog fa-spin fa-4x text-danger mb-4"></i>
                    <h1 class="display-4">500</h1>
                    <h2 class="mb-4">Something Went Wrong</h2>
                    <p class="lead text-muted mb-4">We're experiencing some technical difficulties. Please try again later.</p>
                    <a href="{{ url_for('index') }}" class="btn btn-primary">
                        <i class="fas fa-home me-2"></i>Go Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
